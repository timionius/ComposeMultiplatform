name: CI 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. Run Ktlint Check (across all modules)
      - name: Run Ktlint
        run: ./gradlew ktlintCheck

      # 2. Run Android Lint (specifically for the app module)
      - name: Run Android Lint
        run: ./gradlew :composeApp:lintRelease
